id: bcp-dr
name: BCP / DR
full_name: Business Continuity & Disaster Recovery Planning
nist_primary: Recover
nist_secondary: [Govern]
description: >
  Platforms for planning, testing, and executing business continuity and disaster
  recovery — ensuring critical functions survive and recover from disruptions.
  Encompasses BIA (business impact analysis), recovery plan documentation,
  crisis communication, tabletop exercise management, and DR orchestration.
related_categories: [backup-recovery, grc]
market_notes: >
  BCP/DR planning software overlaps heavily with enterprise GRC platforms. Dedicated
  BC management platforms target regulated industries (financial, healthcare, critical
  infrastructure). Operational resilience regulations (DORA in EU, FCA in UK) are
  driving increased investment in this category.
