id: cyber-recovery
name: Cyber Recovery
full_name: Cyber Recovery Vault & Ransomware Recovery
nist_primary: Recover
nist_secondary: [Respond]
description: >
  Isolated, air-gapped or immutable recovery vaults designed specifically for
  ransomware and destructive attack recovery — distinct from general backup platforms.
  Provides clean-room restore environments, integrity verification of recovery copies,
  and automated recovery orchestration. Addresses the scenario where primary backup
  infrastructure is also compromised or encrypted. Key differentiator from
  backup-recovery: these solutions assume the attacker has compromised or encrypted
  backup infrastructure and provide a separate, hardened recovery chain.
related_categories: [backup-recovery, bcp-dr, soar]
