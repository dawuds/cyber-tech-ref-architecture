id: asset-management
name: Asset Management
full_name: Cyber Asset Attack Surface Management / CMDB
nist_primary: Identify
nist_secondary: [Govern]
description: >
  Discovery and inventory of all IT assets — hardware, software, cloud workloads,
  identities, and data — providing the foundation for risk assessment, vulnerability
  management, and policy enforcement. Modern platforms go beyond CMDB to provide
  continuous, agent-less discovery with relationship mapping.
related_categories: [vulnerability-management, attack-surface-management, ciem]
vendor_framework_coverage:
  microsoft_mcra: Device Security (Defender for Endpoint asset inventory)
  palo_alto_zta: Devices (pillar)
  zscaler_zte: null
  google_csa: null
  crowdstrike_falcon: Risk & Vulnerability (Falcon Discover)
  cisa_ztmm: Devices (pillar)
  aws_sra: null
  cisco_security: null
  checkpoint_infinity: null
  fortinet_security_fabric: "Fabric Management (FortiMonitor — network performance and asset visibility)"

