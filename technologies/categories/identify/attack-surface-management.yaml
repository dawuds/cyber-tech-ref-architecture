id: attack-surface-management
name: Attack Surface Management
full_name: External Attack Surface Management (EASM)
nist_primary: Identify
nist_secondary: [Protect]
description: >
  Continuous discovery and monitoring of internet-facing assets — including unknown,
  unmanaged, and shadow IT assets — from an attacker's perspective. Identifies exposed
  services, certificates, domains, and vulnerabilities before attackers do.
related_categories: [vulnerability-management, asset-management, threat-intelligence]
