  microsoft_mcra: Cloud & Infrastructure (Defender EASM)
  palo_alto_zta: null
  zscaler_zte: null
  google_csa: Threat Intelligence (Mandiant ASM)
  crowdstrike_falcon: Threat Intelligence (Falcon Surface)
  cisa_ztmm: null
  aws_sra: null
  cisco_security: null

