id: threat-intelligence
name: Threat Intelligence
full_name: Cyber Threat Intelligence (CTI) Platforms
nist_primary: Identify
nist_secondary: [Detect, Respond]
description: >
  Platforms aggregating, analyzing, and operationalizing threat data — including
  indicators of compromise (IOCs), threat actor TTPs (MITRE ATT&CK), dark web
  monitoring, and strategic intelligence. Feeds into SIEM, SOAR, and EDR for
  automated IOC matching and enrichment.
related_categories: [siem, soar, attack-surface-management]
vendor_framework_coverage:
  microsoft_mcra: Security Operations (Defender TI)
  palo_alto_zta: null
  zscaler_zte: null
  google_csa: Threat Intelligence (Mandiant TI)
  crowdstrike_falcon: Threat Intelligence (Falcon Intelligence)
  cisa_ztmm: Visibility & Analytics
  aws_sra: null
  cisco_security: Security Operations (Talos)
  checkpoint_infinity: "Infinity Platform (ThreatCloud AI — 50B+ events/day shared threat intelligence)"
  fortinet_security_fabric: "Endpoint & OT (FortiGuard Labs — threat intelligence subscription service)"

products:
