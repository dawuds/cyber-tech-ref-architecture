id: supply-chain-security
name: Supply Chain Security
full_name: Software Supply Chain Security & SBOM Management
nist_primary: Govern
nist_secondary: [Identify, Protect]
description: >
  Secures the software development and distribution supply chain — from open-source
  dependencies and build pipelines to software bills of materials (SBOM) and
  package signing. Addresses attacks like SolarWinds, Log4Shell, and XZ Utils.
  CISA and NIST guidance (SP 800-218 SSDF, EO 14028) are driving enterprise adoption.
  Distinct from general SCA (see application-security) in focus on pipeline integrity
  and provenance, not just vulnerability scanning.
related_categories: [application-security, tprm, cnapp, grc]
market_notes: >
  Executive Order 14028 (2021) mandated SBOMs for US government software suppliers,
  accelerating adoption. SBOM tooling is largely open-source (SPDX, CycloneDX
  standards). Commercial vendors layer policy enforcement, automation, and continuous
  monitoring on top of open standards.
