id: ai-llm-security
name: AI / LLM Security
full_name: AI & Large Language Model Security
nist_primary: Protect
nist_secondary: [Detect, Govern]
description: >
  Emerging category addressing security risks specific to AI/ML systems and LLM
  deployments — prompt injection, jailbreaks, data poisoning, model theft, and
  sensitive data exposure via LLM outputs. Includes AI system security (securing
  the models and pipelines) and AI-powered security tools misuse detection.
  NIST AI RMF (2023) and OWASP LLM Top 10 are the primary governance frameworks.
related_categories: [application-security, dlp, grc]
market_notes: >
  Category emerging rapidly in 2024-2025; 68% of enterprises with LLM deployments
  reported security incidents (2024). Most vendors are early-stage. Major security
  vendors (Microsoft, Palo Alto, Google) adding AI security features to existing
  platforms. OWASP LLM Top 10 v2 released 2024.
vendor_framework_coverage:
  microsoft_mcra: AI Security (Azure AI Content Safety / Purview AI Hub)
  palo_alto_zta: null
  zscaler_zte: null
  google_csa: null
  crowdstrike_falcon: null
  cisa_ztmm: null
  aws_sra: null
  cisco_security: null

products:
  - name: Microsoft Azure AI Content Safety
    vendor: Microsoft
    platform: microsoft-security
    type: SaaS
    notes: Content filtering for Azure OpenAI outputs; prompt shield for injection detection; groundedness detection

  - name: Microsoft Purview AI Hub
    vendor: Microsoft
    platform: microsoft-security
    type: SaaS
    notes: Governance and data security for Copilot for M365; discovers sensitive data in AI interactions

  - name: Google Cloud Model Armor
    vendor: Google
    platform: google-csa
    type: SaaS
