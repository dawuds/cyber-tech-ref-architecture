id: case-management
name: IR Case Management
full_name: Incident Response & Case Management
nist_primary: Respond
nist_secondary: [Recover]
description: >
  Tracks, coordinates, and documents security incidents through their full lifecycle —
  detection, containment, eradication, and recovery. Manages evidence, timelines,
  stakeholder communications, and lessons learned. Bridges the SOC (detection) and
  broader organizational response (legal, comms, leadership).
related_categories: [soar, dfir, grc]
market_notes: >
  Many organizations use general ITSM tools (ServiceNow, Jira) for IR case management.
  Security-specific case management is often bundled with SOAR. TheHive and MISP are
  the dominant open-source options for IR teams.
vendor_framework_coverage:
  microsoft_mcra: null
  palo_alto_zta: null
  zscaler_zte: null
  google_csa: null
  crowdstrike_falcon: null
  cisa_ztmm: null
