  checkpoint_infinity: "Infinity Platform (Infinity SOC — SOC-as-a-service with case management)"
  fortinet_security_fabric: "Security Operations (FortiSOAR — case management module)"

products:
  - name: ServiceNow Security Incident Response
    vendor: ServiceNow
    type: SaaS
    notes: ITSM-native incident management; strong for organizations already using ServiceNow; good SLA tracking

  - name: Palo Alto Cortex XSOAR (Case Management)
    vendor: Palo Alto Networks
    platform: palo-alto-zta
    type: SaaS
    notes: Integrated case management within XSOAR; unified playbook execution and case tracking

  - name: Jira Service Management
    vendor: Atlassian
    type: SaaS|on-prem
    notes: Widely used ITSM adapted for IR; flexible but requires security-specific configuration

  - name: TheHive
    vendor: StrangeBee (open-source)
    type: open-source|on-prem
    notes: Open-source security incident response platform; integrates with MISP; widely used by CERTs

  - name: IBM Security SOAR (Case Management)
    vendor: IBM
    type: on-prem|SaaS
    notes: Strong structured IR with dynamic playbooks based on regulatory jurisdiction and incident type

  - name: PagerDuty (Operations Cloud)
    vendor: PagerDuty
    type: SaaS
    notes: On-call management and incident coordination; strong for DevOps/SRE-integrated security response

  - name: D3 Security SOAR
    vendor: D3 Security
    type: SaaS|on-prem
    notes: Integrated SOAR + case management; MITRE ATT&CK framework for structured investigation

  - name: Exabeam Case Manager
    vendor: Exabeam
    type: SaaS
    notes: Built-in case management within Exabeam SIEM; analyst-focused workflow

  - name: Atlassian Opsgenie
    vendor: Atlassian
    type: SaaS
    notes: Alert management and on-call scheduling; integrates with Jira for incident escalation
