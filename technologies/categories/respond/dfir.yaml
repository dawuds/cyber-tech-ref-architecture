id: dfir
name: DFIR
full_name: Digital Forensics & Incident Response
nist_primary: Respond
nist_secondary: [Recover, Identify]
description: >
  Tools and services for investigating security incidents — collecting evidence,
  analyzing malware, reconstructing attack timelines, and supporting legal/regulatory
  proceedings. Encompasses disk forensics, memory forensics, network forensics,
  mobile forensics, and cloud forensics. Often delivered as a managed service (IR retainer)
  by specialist firms.
related_categories: [soar, case-management, threat-intelligence, backup-recovery]
