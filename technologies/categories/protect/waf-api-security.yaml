id: waf-api-security
name: WAF / API Security
full_name: Web Application Firewall & API Security
nist_primary: Protect
nist_secondary: [Detect]
description: >
  WAF protects web applications from OWASP Top 10 attacks (SQLi, XSS, CSRF) and
  DDoS at the application layer. API security extends this to REST/GraphQL/gRPC APIs —
  discovering shadow APIs, detecting abuse, and enforcing schema validation.
  CDN-integrated WAFs (Cloudflare, Akamai) increasingly combine both.
related_categories: [ngfw-ips, application-security, ztna-sse-sase]
vendor_framework_coverage:
  microsoft_mcra: Cloud & Infrastructure (Azure WAF)
  palo_alto_zta: Applications (Prisma Cloud WAF)
  zscaler_zte: null
  google_csa: Infrastructure Security (Cloud Armor)
  crowdstrike_falcon: null
  cisa_ztmm: Applications & Workloads (pillar)
  aws_sra: Infrastructure Protection (AWS WAF)
  cisco_security: null
  checkpoint_infinity: "CloudGuard (CloudGuard AppSec — AI-based WAF and API security)"
  fortinet_security_fabric: "Cloud Security (FortiWeb — web application firewall)"

