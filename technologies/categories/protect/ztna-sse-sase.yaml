id: ztna-sse-sase
name: ZTNA / SSE / SASE
full_name: Zero Trust Network Access / Security Service Edge / Secure Access Service Edge
nist_primary: Protect
nist_secondary: [Detect]
description: >
  Cloud-delivered converged security and networking. ZTNA replaces VPN with
  identity-aware, least-privilege application access. SSE converges ZTNA + CASB +
  SWG into a single cloud service. SASE adds SD-WAN to SSE for full networking+security
  convergence. The most contested product space in enterprise security 2023-2025.
related_categories: [casb, ngfw-ips, iam-sso-mfa, ndr]
market_notes: >
  Gartner coined SASE (2019) and SSE (2021). All major vendors have repositioned around these terms.
  True SASE requires both SD-WAN and SSE in one vendor; most organizations buy SSE + separate SD-WAN.
  Key differentiator: proxy-based (Zscaler, Netskope) vs. routing-based (Palo Alto, Cisco) architectures.
vendor_framework_coverage:
  microsoft_mcra: Identity & Access (Entra Private Access / Global Secure Access)
  palo_alto_zta: Networks (Prisma Access)
  zscaler_zte: Internet Access + Private Access (core architecture)
  google_csa: Identity & Access (BeyondCorp Enterprise)
  crowdstrike_falcon: null
  cisa_ztmm: Networks (pillar)
  aws_sra: null
  cisco_security: SASE (Cisco+ Secure Connect / Umbrella)
  checkpoint_infinity: "Harmony (Harmony Connect — SASE/ZTNA for remote user access)"
  fortinet_security_fabric: "SASE & Zero Trust Access (FortiSASE — cloud-delivered SSE + SD-WAN)"

