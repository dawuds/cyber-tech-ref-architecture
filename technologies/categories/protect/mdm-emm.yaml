id: mdm-emm
name: MDM / EMM
full_name: Mobile Device Management / Unified Endpoint Management (UEM)
nist_primary: Protect
nist_secondary: [Identify]
description: >
  Manages and enforces security policies on mobile and desktop endpoints —
  enrollment, configuration profiles, app management, remote wipe, and compliance
  enforcement. Modern UEM platforms extend to Windows, macOS, iOS, Android, and
  ChromeOS from a single console. Integrates with ZTNA and conditional access.
related_categories: [iam-sso-mfa, endpoint-protection, ztna-sse-sase]
vendor_framework_coverage:
  microsoft_mcra: Device Security (Microsoft Intune)
  palo_alto_zta: Devices (pillar)
  zscaler_zte: null
  google_csa: null
  crowdstrike_falcon: null
  cisa_ztmm: Devices (pillar)
  aws_sra: null
  cisco_security: null
  checkpoint_infinity: "Harmony (Harmony Mobile — mobile threat defense)"
  fortinet_security_fabric: null

