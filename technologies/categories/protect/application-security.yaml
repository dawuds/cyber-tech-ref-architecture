id: application-security
name: Application Security
full_name: Application Security Testing (SAST / DAST / SCA / IAST)
nist_primary: Protect
nist_secondary: [Identify]
description: >
  Tools testing application code and dependencies for security vulnerabilities throughout
  the software development lifecycle. SAST (static) analyzes source code; DAST (dynamic)
  tests running applications; SCA (composition) scans open-source dependencies; IAST
  (interactive) instruments running apps. Increasingly integrated into CI/CD pipelines
  as DevSecOps matures.
related_categories: [supply-chain-security, cnapp, waf-api-security]
vendor_framework_coverage:
  microsoft_mcra: null
  palo_alto_zta: Applications (Prisma Cloud code security)
  zscaler_zte: null
  google_csa: null
  crowdstrike_falcon: null
  cisa_ztmm: Applications & Workloads (pillar)
  aws_sra: null
  cisco_security: null
  checkpoint_infinity: "CloudGuard (CloudGuard AppSec — AI-based application security)"
  fortinet_security_fabric: null

