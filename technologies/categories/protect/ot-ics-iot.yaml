id: ot-ics-iot
name: OT / ICS / IoT Security
full_name: Operational Technology, Industrial Control Systems & IoT Security
nist_primary: Protect
nist_secondary: [Identify, Detect]
description: >
  Secures industrial control systems (ICS/SCADA), operational technology (OT) networks,
  and IoT devices — environments where traditional IT security tools cannot be deployed
  due to legacy protocols (Modbus, DNP3, BACnet), safety constraints, and uptime
  requirements. Passive network monitoring is the dominant approach to avoid disrupting
  operational systems.
related_categories: [asset-management, ndr, ngfw-ips]
vendor_framework_coverage:
  microsoft_mcra: Cloud & Infrastructure (Defender for IoT)
  palo_alto_zta: null
  zscaler_zte: null
  google_csa: null
  crowdstrike_falcon: null
  cisa_ztmm: null
  aws_sra: null
  cisco_security: null
  checkpoint_infinity: "Quantum (Quantum IoT Protect — embedded IoT firmware security)"
  fortinet_security_fabric: "Endpoint & OT (FortiGate ruggedized OT + FortiNAC OT — dedicated OT/ICS platform)"

