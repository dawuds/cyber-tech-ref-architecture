id: secrets-management
name: Secrets Management
full_name: Secrets & Cryptographic Key Management
nist_primary: Protect
nist_secondary: [Govern]
description: >
  Secure storage, rotation, and distribution of application secrets — API keys,
  database passwords, certificates, and encryption keys. Prevents secrets sprawl
  in code repositories and configuration files. Increasingly important in DevSecOps
  and cloud-native environments where secrets are created at scale.
related_categories: [pam, cnapp, application-security]
market_notes: >
  Overlaps with PAM at the enterprise level. Cloud hyperscalers (AWS, Azure, GCP)
  provide native secrets management. HashiCorp Vault is the de facto standard for
  DevOps/cloud-native. HSMs remain the gold standard for cryptographic key material.
vendor_framework_coverage:
  microsoft_mcra: null
  palo_alto_zta: null
  zscaler_zte: null
  google_csa: Data Security (Cloud KMS / Secret Manager)
  crowdstrike_falcon: null
  cisa_ztmm: null
  aws_sra: Data Protection (Secrets Manager / KMS)
  cisco_security: null

products:
  - name: HashiCorp Vault
    vendor: HashiCorp (IBM, acquired 2024)
    type: SaaS|on-prem|open-source
    notes: De facto standard for dynamic secrets and encryption-as-a-service; broad ecosystem integrations

  - name: AWS Secrets Manager
    vendor: Amazon Web Services
    platform: aws-sra
    type: SaaS
    notes: Native AWS secrets rotation and retrieval; tight Lambda and RDS integration

  - name: AWS Key Management Service (KMS)
    vendor: Amazon Web Services
    platform: aws-sra
    type: SaaS
    notes: Managed cryptographic key service; FIPS 140-2 validated; integrates with all AWS services

  - name: Azure Key Vault
    vendor: Microsoft
    platform: microsoft-security
    type: SaaS
    notes: Managed keys, secrets, and certificates for Azure workloads; integrates with Entra ID

  - name: Google Cloud Secret Manager
    vendor: Google
    platform: google-csa
    type: SaaS
    notes: Managed secrets for GCP workloads with versioning and IAM-based access control

  - name: Google Cloud KMS
    vendor: Google
    platform: google-csa
    type: SaaS
    notes: Cloud-native key management; customer-managed encryption keys (CMEK) for GCP services

  - name: CyberArk Conjur
    vendor: CyberArk
    type: SaaS|on-prem|open-source
    notes: Open-source machine identity and secrets manager; part of CyberArk PAM ecosystem

  - name: Doppler
    vendor: Doppler
    type: SaaS
    notes: Developer-friendly secrets sync across environments and CI/CD pipelines

  - name: Infisical
    vendor: Infisical
    type: SaaS|open-source
    notes: Open-source secrets management with git-like workflow for teams; fast growing

  - name: Thales Luna HSM
    vendor: Thales
    type: hardware
    notes: Hardware Security Module for cryptographic key generation and storage; FIPS 140-2 Level 3
