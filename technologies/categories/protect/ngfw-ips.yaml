id: ngfw-ips
name: NGFW / IPS
full_name: Next-Generation Firewall & Intrusion Prevention System
nist_primary: Protect
nist_secondary: [Detect]
description: >
  Network security enforcement point with stateful inspection, application-layer
  (L7) visibility, IDS/IPS, SSL/TLS inspection, and threat prevention. NGFWs have
  expanded beyond perimeter enforcement to include SD-WAN, cloud-delivered SASE,
  and AI-driven threat prevention.
related_categories: [ztna-sse-sase, ndr, waf-api-security]
